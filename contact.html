<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | IDEAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased overflow-x-hidden selection:bg-indigo-500 selection:text-white pt-24 bg-[#030303]">

    <!-- Navigation -->
    <nav class="glass-nav fixed w-full z-50 top-0 transition-all duration-300 py-4">
        <div class="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-tighter text-white uppercase group hover:opacity-80 transition flex items-center gap-2">
                <i data-lucide="sparkles" class="w-6 h-6 text-indigo-400"></i> IDEAS
            </a>
            <div class="hidden md:flex items-center space-x-8">
                <a href="index.html" class="text-sm font-medium text-gray-300 hover:text-indigo-400 transition">Home</a>
                <a href="shop.html" class="text-sm font-medium text-gray-300 hover:text-indigo-400 transition">Shop</a>
                <a href="about.html" class="text-sm font-medium text-gray-300 hover:text-indigo-400 transition">Our Story</a>
                <a href="contact.html" class="text-sm font-medium text-white hover:text-indigo-400 transition border-b border-indigo-400 pb-1">Contact</a>
            </div>
            <div class="flex items-center space-x-4">
                <a href="cart.html" class="text-gray-300 hover:text-white transition relative">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                    <span class="absolute -top-1 -right-1 bg-indigo-500 text-white text-[10px] w-3.5 h-3.5 flex items-center justify-center rounded-full">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="py-12 md:py-24 relative overflow-hidden min-h-screen flex items-center">
        <!-- Abstract gradient orb -->
        <div class="absolute top-0 right-0 w-[600px] h-[600px] bg-indigo-600/10 blur-[100px] rounded-full pointer-events-none translate-x-1/2 -translate-y-1/2"></div>
        
        <div class="max-w-7xl mx-auto px-6 md:px-12 relative z-10 w-full">
            <div class="grid md:grid-cols-2 gap-16 items-start">
                
                <div class="animate-fade-in-up">
                    <h1 class="text-4xl md:text-5xl font-bold mb-6 text-white text-gradient inline-block">Get in Touch</h1>
                    <p class="text-gray-400 text-lg mb-8 leading-relaxed max-w-md">
                        Have an idea to share, a question about our products, or want to collaborate? We'd love to hear from you.
                    </p>
                    
                    <div class="space-y-6">
                        <div class="flex items-center gap-4 text-gray-300">
                            <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                                <i data-lucide="mail" class="w-5 h-5 text-indigo-400"></i>
                            </div>
                            <div>
                                <h4 class="text-sm font-semibold text-white">Email Us</h4>
                                <p class="text-sm text-gray-400">hello@ideas-website.com</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4 text-gray-300">
                            <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center border border-white/10">
                                <i data-lucide="map-pin" class="w-5 h-5 text-indigo-400"></i>
                            </div>
                            <div>
                                <h4 class="text-sm font-semibold text-white">Visit Us</h4>
                                <p class="text-sm text-gray-400">100 Innovation Lane, Design City</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Contact Form -->
                <div class="bg-gray-900/50 backdrop-blur-md border border-white/5 rounded-3xl p-8 shadow-2xl animate-fade-in-up delay-100">
                    <form class="space-y-6">
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">First Name</label>
                                <input type="text" class="w-full bg-transparent border-b border-white/20 pb-2 text-white placeholder-gray-600 focus:border-indigo-500 focus:outline-none transition" placeholder="John">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Last Name</label>
                                <input type="text" class="w-full bg-transparent border-b border-white/20 pb-2 text-white placeholder-gray-600 focus:border-indigo-500 focus:outline-none transition" placeholder="Doe">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Email</label>
                            <input type="email" class="w-full bg-transparent border-b border-white/20 pb-2 text-white placeholder-gray-600 focus:border-indigo-500 focus:outline-none transition" placeholder="john@example.com">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Message</label>
                            <textarea rows="4" class="w-full bg-transparent border-b border-white/20 pb-2 text-white placeholder-gray-600 focus:border-indigo-500 focus:outline-none transition resize-none" placeholder="Tell us about it..."></textarea>
                        </div>
                        <button type="button" class="btn-primary w-full py-4 rounded-xl text-sm font-semibold text-white mt-4">
                            Send Message
                        </button>
                    </form>
                </div>

            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-[#030303] border-t border-white/5 pt-12 pb-6">
        <div class="max-w-7xl mx-auto px-6 md:px-12 text-center text-xs text-gray-500">
            <p>&copy; 2026 IDEAS. All rights reserved.</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
