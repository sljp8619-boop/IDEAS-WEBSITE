<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | IDEAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="antialiased overflow-x-hidden selection:bg-indigo-500 selection:text-white pt-24 bg-[#030303]">

    <!-- Navigation -->
    <nav class="glass-nav fixed w-full z-50 top-0 transition-all duration-300 py-4">
        <div class="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-tighter text-white uppercase group hover:opacity-80 transition flex items-center gap-2">
                <i data-lucide="sparkles" class="w-6 h-6 text-indigo-400"></i> IDEAS
            </a>
            <div class="flex items-center space-x-4">
                <a href="shop.html" class="text-gray-300 hover:text-white transition text-sm flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Continue Shopping
                </a>
            </div>
        </div>
    </nav>

    <!-- Cart Area -->
    <section class="py-12 md:py-24 min-h-screen">
        <div class="max-w-4xl mx-auto px-6 md:px-12">
            <h1 class="text-3xl md:text-4xl font-bold mb-10 text-center text-white">Your Cart</h1>
            
            <div class="bg-gray-900/50 border border-white/5 rounded-2xl p-6 md:p-8 animate-slide-up">
                
                <!-- Cart Item -->
                <div class="flex flex-col sm:flex-row items-center gap-6 pb-6 border-b border-white/5">
                    <img src="images/product_1_1774235194003.png" alt="Lumina Levitation" class="w-24 h-24 object-cover rounded-xl bg-gray-800">
                    <div class="flex-1 text-center sm:text-left text-white">
                        <h3 class="font-semibold text-lg">Lumina Levitation Base</h3>
                        <p class="text-gray-400 text-sm mt-1">Lighting</p>
                    </div>
                    <div class="flex items-center space-x-6">
                        <div class="flex items-center border border-white/10 rounded-full py-1 px-3">
                            <button class="text-gray-400 hover:text-white px-2 py-1">-</button>
                            <input type="text" value="1" class="w-8 text-center bg-transparent border-none focus:ring-0 text-white text-sm outline-none">
                            <button class="text-gray-400 hover:text-white px-2 py-1">+</button>
                        </div>
                        <p class="font-medium text-white">$249.00</p>
                        <button class="text-gray-500 hover:text-red-400 transition"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>
                </div>

                <!-- Summary -->
                <div class="mt-8 flex flex-col items-end">
                    <div class="w-full sm:w-1/2 md:w-1/3">
                        <div class="flex justify-between mb-3 text-sm text-gray-400">
                            <span>Subtotal</span>
                            <span class="text-white">$249.00</span>
                        </div>
                        <div class="flex justify-between mb-4 text-sm text-gray-400">
                            <span>Shipping</span>
                            <span class="text-white">Calculated at checkout</span>
                        </div>
                        <div class="flex justify-between mb-6 text-lg font-semibold text-white border-t border-white/10 pt-4">
                            <span>Total</span>
                            <span>$249.00</span>
                        </div>
                        <button class="btn-primary w-full py-4 rounded-full text-sm font-semibold text-white flex justify-center items-center gap-2">
                            Proceed to Checkout <i data-lucide="arrow-right" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-[#030303] border-t border-white/5 pt-12 pb-6">
        <div class="max-w-7xl mx-auto px-6 md:px-12 text-center text-xs text-gray-500">
            <p>&copy; 2026 IDEAS. All rights reserved.</p>
        </div>
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
